name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; new pushes cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eia_toolkit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.2
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (PWA)
        # base-href must match the repo name so asset paths resolve on
        # https://<user>.github.io/EIA_toolkitt/
        run: flutter build web --release --base-href /EIA_toolkitt/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: eia_toolkit/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
