<!DOCTYPE html>
<html lang="ja">
<head>
  <!--
    base href is replaced by the value of the `--base-href` argument at
    `flutter build` time. Keep the leading/trailing slashes.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="日本の環境影響評価（EIA）業務支援ツール — オフライン対応・現地調査向け">

  <!-- PWA / theme -->
  <meta name="theme-color" content="#1B4332">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS Safari: add-to-home-screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EIAツールキット">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>EIAツールキット</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body { margin: 0; padding: 0; height: 100%; background-color: #F4F1EA; }
    /* Branded splash shown until the Flutter engine paints its first frame */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background-color: #F4F1EA;
      transition: opacity 0.35s ease;
      z-index: 9999;
    }
    #splash img { width: 84px; height: 84px; border-radius: 20px; }
    #splash .spinner {
      width: 26px; height: 26px;
      border: 3px solid rgba(27, 67, 50, 0.2);
      border-top-color: #1B4332;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #splash.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="splash">
    <img src="icons/Icon-192.png" alt="EIAツールキット">
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>

  <script>
    // Hide the splash once Flutter has rendered its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function () { splash.remove(); }, 400);
      }
    });
  </script>
</body>
</html>
